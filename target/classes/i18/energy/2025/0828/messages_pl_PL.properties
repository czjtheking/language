OFF_GRID_RUNNING_HAVE_GENERATOR=Bez generatora\: Elektrownia pracuje w trybie off-grid. Obci\u0105\u017Cenie jest\u4F18\u5148 zasilane przez fotowoltaik\u0119, a ewentualny niedob\u00F3r jest uzupe\u0142niany przez roz\u0142adowanie magazynu. Zapewnia normaln\u0105 prac\u0119 odbiornik\u00F3w.Z generatorem\: Elektrownia pracuje w trybie off-grid. Zasilanie obci\u0105\u017Cenia zapewniane jest przez kombinacj\u0119 fotowoltaiki, magazynu i generatora. Zapewnia normaln\u0105 prac\u0119 odbiornik\u00F3w.
