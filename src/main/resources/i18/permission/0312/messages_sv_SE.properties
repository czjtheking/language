HOMEOWNER_ACTIVATE_TEMPLATE_CONTENT=<html><head><meta charset\="UTF-8"><title>Inbjudan till registrering f\u00F6r Atmozen-appen</title></head><body><p>B\u00E4sta anv\u00E4ndare\!</p><p></p><p>Installat\u00F6ren [{0}] har skapat en anl\u00E4ggning \u00E5t dig. F\u00F6r att du ska kunna hantera anl\u00E4ggningen b\u00E4ttre rekommenderar vi att du laddar ner Atmozen-appen och registrerar ett \u00E4garkonto.</p><p><strong style\="color\: \#0070c0;">Du kan g\u00E5 till Google Play eller App Store f\u00F6r iOS f\u00F6r att ladda ner Atmozen-appen.</strong></p><p>Kontakta din installat\u00F6r om du har n\u00E5gra fr\u00E5gor.</p><p>Om du redan har registrerat ett konto p\u00E5 Atmozen kan du ignorera det h\u00E4r meddelandet.</p><p>V\u00E4nliga h\u00E4lsningar,</p><p>Atmoce.</p></body></html>
