STATION_GRID_OFF_LINE_WITHOUT_BATTERY_SUBJECT=Elektrownia Off-Grid
STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny u\u017Cytkowniku\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gratulacje\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Twoja elektrownia [&{}&] przesz\u0142a na tryb Off-Grid. Pozosta\u0142y poziom na\u0142adowania akumulatora wynosi &{}&%, co szacunkowo wystarczy na &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Sprawd\u017A, czy jest to spowodowane przerw\u0105 w zasilaniu z sieci lub b\u0142\u0119dem obwodu AC.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Je\u015Bli masz pytania albo nie potrafisz usun\u0105\u0107 problemu, niezw\u0142ocznie skontaktuj si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Pozdrawiamy,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Elektrownia Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\\\="padding\\\: 20px;line-height\\\: 1.4;"><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Szanowny u\u017Cytkowniku,</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Witaj\!</p><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Tw\u00F3j obiekt [&{}&] zosta\u0142a od\u0142\u0105czona od sieci. Poziom na\u0142adowania baterii wynosi &{}&%.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Zalecamy wy\u0142\u0105czenie niepotrzebnych odbiornik\u00F3w w celu oszcz\u0119dzania energii.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">W przypadku pyta\u0144 lub niemo\u017Cno\u015Bci rozwi\u0105zania problemu, nale\u017Cy natychmiast skontaktowa\u0107 si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Z powa\u017Caniem,</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Elektrownia Offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny u\u017Cytkowniku domowy urz\u0105dzenia Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gratulujemy\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Twoja elektrownia [&{}&] przesz\u0142a w tryb offline. Zalecamy niezw\u0142oczne przywr\u00F3cenie pracy w sieci.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Mo\u017Cliwe przyczyny\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. Wy\u0142\u0105cznik obwodu PV zadzia\u0142a\u0142 i uk\u0142ad fotowoltaiczny przesta\u0142 dzia\u0142a\u0107.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. Komunikacja pomi\u0119dzy bram\u0105 a chmur\u0105 zosta\u0142a przerwana z powodu b\u0142\u0119du sieci (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Je\u015Bli masz pytania albo nie potrafisz usun\u0105\u0107 problemu, niezw\u0142ocznie skontaktuj si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Pozdrawiamy,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Stan elektrowni w skr\u00F3cie
STATION_STATUS_INSTALLER_CONTENT=STATION_STATUS_INSTALLER_CONTENT\=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny instalatorze,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Witaj\!</p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Otw\u00F3rz aplikacj\u0119 Atmoce i sprawd\u017A &{}& zarz\u0105dzane przez Ciebie lokalizacje. Szczeg\u00F3\u0142y s\u0105 nast\u0119puj\u0105ce\:</p> <ul style\="padding-left\: 20px"> &{inside}& </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Je\u015Bli lokalizacja zostanie wy\u0142\u0105czona, mog\u0142o doj\u015B\u0107 do zadzia\u0142ania wy\u0142\u0105cznika fotowoltaicznego, przez co system solarny przesta\u0142 dzia\u0142a\u0107. Sprawd\u017A to.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> D\u0142ugotrwa\u0142e pozostawanie lokalizacji w trybie offline mo\u017Ce wp\u0142yn\u0105\u0107 na gwarancj\u0119 urz\u0105dzenia. Nale\u017Cy niezw\u0142ocznie rozwi\u0105za\u0107 problem.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Za\u0142\u0105czono\: Lista obiekt\u00F3w</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > Nr </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Nazwa obiekt\u00F3w</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Data instalacji</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Opis problemu </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Z powa\u017Caniem,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p> </div> </body> </html>
