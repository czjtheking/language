HOMEOWNER_ACTIVATE_TEMPLATE_CONTENT=<html><head><meta charset\="UTF-8"><title>Convite de registo na aplica\u00E7\u00E3o Atmozen</title></head><body><p>Caro utilizador,</p><p></p><p>IO Instalador [{0}] criou um local para si. Para o ajudar a gerir o local, recomendamos que transfira a aplica\u00E7\u00E3o Atmozen e se registe com uma conta de propriet\u00E1rio da habita\u00E7\u00E3o.</p><p><strong style\="color\: \#0070c0;">Pode aceder \u00E0 Google Play ou \u00E0 iOS App Store para transferir a app Atmozen.</strong></p><p>Se tiver alguma d\u00FAvida, contacte o seu instalador.</p><p>Se j\u00E1 tiver uma conta na Atmozen, pode ignorar esta mensagem.</p><p>Com os melhores cumprimentos,</p><p>Atmoce.</p></body></html>
