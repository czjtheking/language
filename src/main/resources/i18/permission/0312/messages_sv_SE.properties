EMAIL_REGISTER_TEMPLATE_SUBJECT=Verifieringskod f\u00F6r [{0}]-Atmoce-Cloud
EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\!<br />V\u00E4lkommen till Atmoce. Din verifieringskod \u00E4r\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Denna kod \u00E4r giltig i 10 minuter. Av s\u00E4kerhetssk\u00E4l, dela inte denna kod med n\u00E5gon annan.</p><p>V\u00E4nliga h\u00E4lsningar,<br />Atmoce</p></html>
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_SUBJECT=Beg\u00E4ran om \u00E5terst\u00E4llning av l\u00F6senord f\u00F6r Atmoce-Cloud
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\!<br />Vi har mottagit din beg\u00E4ran om att \u00E5terst\u00E4lla ditt l\u00F6senord. Din verifieringskod \u00E4r\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Denna kod \u00E4r giltig i 10 minuter. Av s\u00E4kerhetssk\u00E4l ska du inte dela denna kod med n\u00E5gon annan.</p><p>V\u00E4nliga h\u00E4lsningar,<br />Atmoce</p></html>
EMAIL_CHANGE_TEMPLATE_SUBJECT=beg\u00E4ran om \u00E4ndring av e-postadress f\u00F6r Atmoce-Cloud
EMAIL_CHANGE_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\!<br />Vi har mottagit din beg\u00E4ran om att \u00E4ndra din e-postadress. Din verifieringskod \u00E4r\:<br /><span style\="font-size\: 18px;color\: \#0070c0;"><strong>{0}</strong></span></div><p>Denna kod \u00E4r giltig i 10 minuter. Av s\u00E4kerhetssk\u00E4l ska du inte dela denna kod med n\u00E5gon annan.</p><p>V\u00E4nliga h\u00E4lsningar,<br />Atmoce</p></html>
FACTORY_PWD_INIT_TEMPLATE_SUBJECT=Konto och initialt l\u00F6senord f\u00F6r Atmoce-Cloud
FACTORY_PWD_INIT_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\!<br />Administrat\u00F6ren har skapat ett konto \u00E5t dig. Konto\: {0}, l\u00F6senord\: <span style\="">{1}</span><br />\nDu kan logga in och \u00E4ndra l\u00F6senordet genom att f\u00F6lja dessa steg\:<br />Skanna QR-koden f\u00F6r att ladda ner Atmozen-appen, logga in med det initiala l\u00F6senordet och \u00E4ndra sedan l\u00F6senordet.<br /><div><img width\="200px" height\="200px" src\="{2}" /></div></div><p>V\u00E4nliga h\u00E4lsningar,<br />Atmoce.</p></html>
INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=V\u00E4lkommen till Atmoce.
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\!<br />[{0}] har skickat en inbjudan till dig och skapat ett konto \u00E5t dig. Konto\: {1}. Klicka p\u00E5 f\u00F6ljande l\u00E4nk f\u00F6r att \u00E4ndra l\u00F6senordet och aktivera kontot\:<br /><a style\="color\: \#0070c0;" href\="{2}">[L\u00E4nk f\u00F6r aktivering av konto]</a><br />Eller kopiera l\u00E4nken f\u00F6r att \u00F6ppna den i din webbl\u00E4sare\:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>L\u00E4nken \u00E4r giltig i 7 dagar.<br />Kontakta din installat\u00F6r om du har n\u00E5gra fr\u00E5gor.</p><p>V\u00E4nliga h\u00E4lsningar,<br />Atmoce.</p></html>
EMAIL_LOGOFF_TEMPLATE_SUBJECT=Atmoce \u2013 F\u00F6rfr\u00E5gan om att avsluta konto
EMAIL_LOGOFF_TEMPLATE_CONTENT=<html><div>B\u00E4sta anv\u00E4ndare\! <br />Vi har mottagit din beg\u00E4ran om att avsluta ditt Atmoce-konto. Din verifieringskod \u00E4r\: <br /><strong>\n<span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div>\n<p>Denna kod \u00E4r giltig i 10 minuter. Av s\u00E4kerhetssk\u00E4l ska du inte dela denna kod med n\u00E5gon annan. </p>\n<p>V\u00E4nliga h\u00E4lsningar, <br />Atmoce-teamet</p></html>
