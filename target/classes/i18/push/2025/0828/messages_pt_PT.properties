STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Caro utilizador\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Ol\u00E1\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">O seu local [&{}&] est\u00E1 desligado da rede el\u00E9trica. O n\u00EDvel restante da bateria \u00E9 de &{}&%, com dura\u00E7\u00E3o prevista de &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Verifique se isto se deve a uma falha na rede el\u00E9trica ou a um erro no circuito CA.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Se tiver d\u00FAvidas ou n\u00E3o conseguir resolver o problema, contacte imediatamente o seu instalador.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atentamente,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">A Equipa Atmoce</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Local desligado da rede el\u00E9trica
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Caro utilizador\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Ol\u00E1\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">O seu local [&{}&] est\u00E1 desligado da rede el\u00E9trica. O n\u00EDvel restante da bateria \u00E9 de &lt;&{}&%.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Recomendamos que desligue cargas desnecess\u00E1rias para economizar energia.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Se tiver d\u00FAvidas ou n\u00E3o conseguir resolver o problema, contacte imediatamente o seu instalador.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atentamente,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">A Equipa Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Local offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Caro propriet\u00E1rio da habita\u00E7\u00E3o Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Ol\u00E1\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">O seu local [&{}&] est\u00E1 offline. Recomenda-se uma restaura\u00E7\u00E3o imediata.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Poss\u00EDveis causas\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. O disjuntor fotovoltaico disparou e o sistema solar parou de funcionar.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. A comunica\u00E7\u00E3o entre o gateway e a nuvem foi interrompida devido a um erro de rede (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Se tiver d\u00FAvidas ou n\u00E3o conseguir resolver o problema, contacte imediatamente o seu instalador.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atentamente,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">A Equipa Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Resumo do estado do local
STATION_STATUS_INSTALLER_CONTENT=<html> <div style\=""padding\: 20px; line-height\: 1.4""> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Caro instalador\: </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Ol\u00E1\! </p> <br /> <p style\=""margin\: 0 0 16px; font-size\: 16px; color\: \#18191a""> Abra a aplica\u00E7\u00E3o Atmoce e verifique &{}& locais sob a sua gest\u00E3o. Os detalhes s\u00E3o os seguintes\: </p> <ul style\=""padding-left\: 20px""> <li style\=""margin-bottom\: 4px"">N\u00FAmero de locais offline\: &{}& </li> <li style\=""margin-bottom\: 4px"">N\u00FAmero de erros no local\: &{}& </li> </ul> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a""> Se um local permanecer offline por muito tempo, o disjuntor fotovoltaico pode ter disparado, fazendo com que o sistema solar pare de funcionar. Verifique. </p> <br /> <p style\=""margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a"">Em anexo\: lista de locais </p> <table style\=""width\: 100%; border-collapse\: collapse""> <tr> <td style\="" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; "" > N.\u00BA </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe"">Nome do local </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe"">Data de instala\u00E7\u00E3o </td> <td style\="" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; "" >Descri\u00E7\u00E3o do problema </td> </tr> &{}& </table> <br /> <br /> <br /> <br /> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559"">Atentamente, </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559""> Equipa Atmoce</p> </div> </html>
