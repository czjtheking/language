PV_ALARM_SUGGESTION_0_LEVEL=Sem erros.
PV_ALARM_SUGGESTION_1_LEVEL=1. Verifique se a superf\u00EDcie do painel solar est\u00E1 obstru\u00EDda por objetos como folhas, p\u00F3, dejetos de p\u00E1ssaros ou sombras de \u00E1rvores e linhas a\u00E9reas. Em caso afirmativo, resolva o problema de imediato.\n2. Verifique se a baixa irradia\u00E7\u00E3o solar \u00E9 causada pela orienta\u00E7\u00E3o do painel solar.\n3. Se o problema persistir, contacte o distribuidor ou fabricante do seu componente.
PV_ALARM_SUGGESTION_2_LEVEL=1. Verifique se a superf\u00EDcie do painel solar est\u00E1 obstru\u00EDda por objetos como folhas, p\u00F3, dejetos de p\u00E1ssaros ou sombras de \u00E1rvores e linhas a\u00E9reas. Em caso afirmativo, resolva o problema de imediato.\n2. Verifique se a baixa irradia\u00E7\u00E3o solar \u00E9 causada pela orienta\u00E7\u00E3o do painel solar.\n3. Verifique o painel solar quanto a eventuais falhas, como quebra de vidro, descolora\u00E7\u00E3o do EVA, degrada\u00E7\u00E3o induzida por potencial (PID) e curto-circuito nos d\u00EDodos de bypass.\n4. Se o problema persistir, contacte o distribuidor ou fabricante do seu componente.
PV_ALARM_SUGGESTION_3_LEVEL=1. Verifique se a superf\u00EDcie do painel solar est\u00E1 obstru\u00EDda por objetos como folhas, p\u00F3, dejetos de p\u00E1ssaros ou sombras de \u00E1rvores e linhas a\u00E9reas. Em caso afirmativo, resolva o problema de imediato.\n2. Verifique se a baixa irradia\u00E7\u00E3o solar \u00E9 causada pela orienta\u00E7\u00E3o do painel solar.\n3. Verifique se o painel solar apresenta danos graves, como circuitos abertos.\n4. Se o problema persistir, contacte o distribuidor ou fabricante do seu componente.
