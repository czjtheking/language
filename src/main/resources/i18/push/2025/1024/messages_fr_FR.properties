STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Cher propri\u00E9taire Atmoce,</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Bonjour\u00A0\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Votre site [&{}&] est hors ligne. Une restauration rapide est recommand\u00E9e.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Causes possibles\u00A0\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. Le disjoncteur PV s'est d\u00E9clench\u00E9 et le syst\u00E8me solaire a cess\u00E9 de fonctionner.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. La communication passerelle-cloud a \u00E9t\u00E9 interrompue en raison d'une erreur r\u00E9seau (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Si vous avez des questions ou ne parvenez pas \u00E0 r\u00E9soudre le probl\u00E8me, contactez imm\u00E9diatement votre installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cordialement,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">L'\u00E9quipe Atmoce</p></div></html>
