STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gentile utente\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">L\u2019impianto [&{}&] \u00E8 Off-Grid. Il livello di batteria rimanente \u00E8 &{}&%, che durer\u00E0 &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Verifica se il problema \u00E8 dovuto a un'interruzione di rete o a un errore del circuito CA.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Se hai domande o non riesci a risolvere il problema, contatta subito l\u2019installatore.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cordiali saluti,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Il team Atmoce</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Off-Grid impianto
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\\\="padding\\\: 20px;line-height\\\: 1.4;"><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Gentile utente\:</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a"></p><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">L\u2019impianto [&{}&] \u00E8 Off-Grid. Il livello di batteria rimanente \u00E8 &{}&%.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Consigliamo di spegnere i dispositivi non necessari per risparmiare energia.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Per qualsiasi domanda o in caso di difficolt\u00E0 nel risolvere il problema, contattare subito l'installatore.</p><br /><br /><br /><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Cordiali saluti,</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Team Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Offline impianto
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gentile proprietario Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">L\u2019impianto &{}& \u00E8 offline. Si consiglia un ripristino immediato.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Possibili cause\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. L'interruttore FV \u00E8 scattato e l'impianto ha smesso di funzionare.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. La comunicazione tra gateway e cloud \u00E8 stata interrotta a causa di un errore di rete (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Se hai domande o non riesci a risolvere il problema, contatta subito l\u2019installatore.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cordiali saluti,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Il team Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Sintesi stato dell'impianto
STATION_STATUS_INSTALLER_CONTENT=STATION_STATUS_INSTALLER_CONTENT\=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gentile installatore\:</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Apri l'app Atmoce e controlla i &{}& impianti gestiti. I dettagli sono i seguenti\:</p> <ul style\="padding-left\: 20px"> e{inside}e\u00A0\u00A0\u00A0\u00A0\u00A0 </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Se un impianto \u00E8 offline, \u00E8 possibile che l'interruttore fotovoltaico sia scattato e che l'impianto abbia smesso di funzionare. Verificare.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> Un impianto che resta offline per un lungo periodo di tempo pu\u00F2 influire sulla garanzia del dispositivo. Risolvere subito il problema.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Allegato\: elenco di impianti</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > N. </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Nome impianto</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Data di installazione</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Descrizione del problema </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cordiali saluti,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Team Atmoce</p> </div> </body> </html>
