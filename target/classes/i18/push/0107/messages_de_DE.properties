STATION_GRID_OFF_LINE_WITHOUT_BATTERY_SUBJECT=Anlage Off-Grid
STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Liebe(r) Nutzer*in,</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">hallo\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Ihre Anlage <span style\="font-weight\: 700;">&{}&</span> ist nun Off-Grid. Der verbleibende Akkustand betr\u00E4gt <span style\="color\: \#3E7EF8;">&{}&%</span> und reicht voraussichtlich noch f\u00FCr <span style\="color\: \#3E7EF8;">&{}&</span>.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">\u00DCberpr\u00FCfen Sie, ob dies auf einen Netzausfall oder einen Fehler im Wechselstromkreis zur\u00FCckzuf\u00FChren ist.</p><br/><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Wenn Sie Fragen haben oder das Problem nicht beheben k\u00F6nnen, wenden Sie sich umgehend an Ihren Installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Mit freundlichen Gr\u00FC\u00DFen</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Das Atmoce-Team</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Anlage Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Liebe(r) Nutzer*in,</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">hallo\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Ihre Anlage <span style\="font-weight\: 700;">&{}&</span> ist nun Off-Grid. Der verbleibende Akkustand betr\u00E4gt <span style\="color\: \#3E7EF8;">&{}&%</span>.</p><br/><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Wir empfehlen Ihnen, unn\u00F6tige Lasten auszuschalten, um Strom zu sparen.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Wenn Sie Fragen haben oder das Problem nicht beheben k\u00F6nnen, wenden Sie sich umgehend an Ihren Installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Mit freundlichen Gr\u00FC\u00DFen</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Ihr Atmoce-Team</p></div></html>
STATION_OFF_LINE_SUBJECT=Anlage offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Liebe(r) Atmoce-Hausbesitzer*in,</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">hallo\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Ihre Anlage <span style\="font-weight\: 700;">&{}&</span> ist nun offline. Eine umgehende Wiederherstellung der Verbindung wird empfohlen.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">M\u00F6gliche Ursachen\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. Der PV-Trennschalter wurde ausgel\u00F6st und die Solaranlage funktioniert nicht mehr.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. Die Kommunikation zwischen Gateway und Cloud wurde aufgrund eines Netzwerkfehlers (FE/WLAN) unterbrochen.</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Wenn Sie Fragen haben oder das Problem nicht beheben k\u00F6nnen, wenden Sie sich umgehend an Ihren Installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Mit freundlichen Gr\u00FC\u00DFen</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Das Atmoce-Team</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Anlagenstatus auf einen Blick
STATION_STATUS_INSTALLER_CONTENT=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Lieber Installateur,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">guten Tag\!</p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Bitte \u00F6ffnen Sie die Atmoce-App und \u00FCberpr\u00FCfen Sie die &{}& Anlagen, die Sie verwalten. Die Details lauten wie folgt\:</p> <ul style\="padding-left\: 20px"> &{inside}&\u00A0\u00A0\u00A0\u00A0\u00A0 </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Wenn eine Anlage offline geht, ist m\u00F6glicherweise der PV-Trennschalter ausgel\u00F6st worden, sodass die Solaranlage nicht mehr funktioniert. Bitte \u00FCberpr\u00FCfen Sie dies.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> Eine Anlage, die \u00FCber einen l\u00E4ngeren Zeitraum offline bleibt, kann die Ger\u00E4tegarantie beeintr\u00E4chtigen. Bitte beheben Sie das Problem umgehend.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Anhang\: Liste der Anlagen</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > Nr. </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Anlagenname</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Datum der Installation</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Problembeschreibung </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Mit freundlichen Gr\u00FC\u00DFen</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Das Atmoce-Team</p> </div> </body> </html>
