EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>Caro utente,<br />Benvenuto su Atmoce. Il tuo codice di verifica \u00E8\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Questo codice \u00E8 valido per 10 minuti. Per garantire la sicurezza, non condividere questo codice con altri.</p><p>Cordiali saluti,<br />Atmoce</p></html>
