EMAIL_REGISTER_TEMPLATE_SUBJECT=[{0}] - Votre captcha Atmoce-Cloud
EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>Chers utilisateurs, <br/> bienvenue chez Atmoce. Votre code de v\u00E9rification est le suivant \: <br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Ce code n\u2019est valable que 5 minutes. Veuillez saisir ce code de v\u00E9rification sur la page Atmoce. Pour des raisons de s\u00E9curit\u00E9, ne partagez pas votre code de v\u00E9rification avec qui que ce soit. </p><p>Meilleures salutations, <br/> de la part de l\u2019\u00E9quipe Atmoce. </p></html>
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_SUBJECT=Atmoce-Cloud Demande de r\u00E9cup\u00E9ration de mot de passe
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_CONTENT=<html><div>Chers utilisateurs\: <br /> Nous avons re\u00E7u votre demande de r\u00E9cup\u00E9rer le mot de passe de votre compte Atmoce. Votre code de v\u00E9rification \: <br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Ce code n\u2019est valable que 5 minutes. Veuillez saisir ce code de v\u00E9rification sur la page Atmoce. Pour des raisons de s\u00E9curit\u00E9, ne partagez pas votre code de v\u00E9rification avec qui que ce soit. </p><p>Meilleures salutations\!<br/> de la part de l\u2019\u00E9quipe Atmoce.</p></html>
EMAIL_CHANGE_TEMPLATE_SUBJECT=Atmoce-Cloud Demande de changement de bo\u00EEte aux lettres
EMAIL_CHANGE_TEMPLATE_CONTENT=<html><div>Chers utilisateurs, <br/>Nous avons re\u00E7u votre demande de modification de l\u2019adresse e-mail de votre compte Atmoce. Votre code de v\u00E9rification \: <br/><span style\="font-size\: 18px;color\: \#0070c0;"><strong>{0}</strong></span></div><p>Ce code n\u2019est valable que 5 minutes. Veuillez saisir ce code de v\u00E9rification sur la page Atmoce. Pour des raisons de s\u00E9curit\u00E9, ne partagez pas votre code de v\u00E9rification avec qui que ce soit. </p><p>Meilleures salutations\!<br/> de la part de l\u2019\u00E9quipe Atmoce Holding B.V.</p></html>
FACTORY_PWD_INIT_TEMPLATE_SUBJECT=Atmoce-Cloud compte de la plate-forme cloud et mot de passe initial
FACTORY_PWD_INIT_TEMPLATE_CONTENT=<html><div>Chers utilisateurs, Bonjour \!<br /> administrateur cr\u00E9e un compte pour vous, compte \: {0}, mot de passe initial \: <span style\="">{1}</span><br />Vous pouvez vous connecter et modifier votre mot de passe de l\u2019une des mani\u00E8res suivantes \: <br />1.Scannez le code QR pour t\u00E9l\u00E9charger l\u2019application Atmozen., connectez-vous avec le mot de passe initial et modifiez le mot de passe<br /><div><img width\="200px" height\="200px" src\="{2}" /></div>2. Cliquez sur <a style\="color\: \#0070c0" href\="{3}" > [Lien de t\u00E9l\u00E9chargement de l\u2019application],</a> ou copiez le lien pour ouvrir <br /> sur votre t\u00E9l\u00E9phone.</div><p>Meilleures salutations\!<br/> de la part de l\u2019\u00E9quipe Atmoce.</p></html>
INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=Bienvenue \u00E0 Atmoce
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>Chers utilisateurs, <br/> F\u00E9licitations \![{0}] Je vous invite \u00E0 vous inscrire et \u00E0 cr\u00E9er un nouveau compte pour vous dans Atmoce,Num\u00E9ro de compte \: {1}. Cliquez sur le lien ci-dessous pour changer votre mot de passe et activer \: <br /><a style\="color\: \#0070c0" href\="{2}">[Lien d\u2019activation du compte]</a><br />Ou copiez le lien pour l\u2019ouvrir dans votre navigateur \:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>Le lien d\u2019activation est valable 7 jours. <br/> En cas de doute, veuillez contacter votre installateur. </p><p>Meilleures salutations\!<br/> de la part de l\u2019\u00E9quipe Atmoce.</p></html>
EMAIL_LOGOFF_TEMPLATE_SUBJECT=Atmoce - Demande d\u2019annulation de compte
EMAIL_LOGOFF_TEMPLATE_CONTENT=<html><div>Cher utilisateur, <br />nous avons re\u00E7u votre demande d\u2019annulation de votre compte Atmoce. Votre code de v\u00E9rification est\u00A0le suivant\u00A0\: <br /><strong>\n<span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div>\n<p>Le code est valable 5\u00A0minutes. Pour des raisons de s\u00E9curit\u00E9, ne partagez pas ce code avec d\u2019autres personnes. </p>\n<p>Meilleures salutations\u00A0\! <br />L\u2019\u00E9quipe Atmoce</p></html>
