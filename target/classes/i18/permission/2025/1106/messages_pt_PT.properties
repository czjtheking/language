EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>Caro utilizador,<br />Bem-vindo \u00E0 Atmoce. O seu c\u00F3digo de verifica\u00E7\u00E3o \u00E9\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Este c\u00F3digo \u00E9 v\u00E1lido por 10 minutos. Para garantir a seguran\u00E7a, n\u00E3o partilhe este c\u00F3digo com ningu\u00E9m.</p><p>Com os melhores cumprimentos,<br />Atmoce</p></html>
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_SUBJECT=Pedido de recupera\u00E7\u00E3o de palavra-passe da Atmoce-Cloud
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_CONTENT=<html><div>Caro utilizador,<br />Recebemos o seu pedido para recuperar a palavra-passe. O seu c\u00F3digo de verifica\u00E7\u00E3o \u00E9\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>O c\u00F3digo \u00E9 v\u00E1lido por 10 minutos. Para garantir a seguran\u00E7a, n\u00E3o partilhe este c\u00F3digo com ningu\u00E9m.</p><p>Com os melhores cumprimentos,<br />Atmoce</p></html>
EMAIL_CHANGE_TEMPLATE_SUBJECT=Pedido de altera\u00E7\u00E3o do endere\u00E7o de e-mail da Atmoce-Cloud
EMAIL_CHANGE_TEMPLATE_CONTENT=<html><div>Caro utilizador,<br />Recebemos o seu pedido para alterar o endere\u00E7o de e-mail. O seu c\u00F3digo de verifica\u00E7\u00E3o \u00E9\:<br /><span style\="font-size\: 18px;color\: \#0070c0;"><strong>{0}</strong></span></div><p>O c\u00F3digo \u00E9 v\u00E1lido por 10 minutos. Para garantir a seguran\u00E7a, n\u00E3o partilhe este c\u00F3digo com ningu\u00E9m.</p><p>Com os melhores cumprimentos,<br />Atmoce</p></html>
FACTORY_PWD_INIT_TEMPLATE_SUBJECT=Conta e palavra-passe inicial da Atmoce-Cloud
FACTORY_PWD_INIT_TEMPLATE_CONTENT=<html><div>Caro utilizador,<br />O administrador criou uma conta para si. Conta\: {0}, palavra-passe\: <span style\="">{1}</span><br />\nPode iniciar sess\u00E3o e alterar a palavra-passe seguindo os passos abaixo\:<br />Leia o c\u00F3digo QR para transferir a aplica\u00E7\u00E3o Atmozen, inicie sess\u00E3o com a palavra-passe inicial e, em seguida, altere a palavra-passe.<br /><div><img width\="200px" height\="200px" src\="{2}" /></div></div><p>Com os melhores cumprimentos,<br />Atmoce.</p></html>
INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=Bem-vindo \u00E0 Atmoce.
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>Caro utilizador,<br />[{0}] enviou-lhe um convite e criou uma conta para si. Conta\: {1}. Clique no link abaixo para alterar a palavra-passe e ativar a conta\:<br /><a style\="color\: \#0070c0;" href\="{2}">[Link de ativa\u00E7\u00E3o da conta]</a><br />Ou copie o link para o seu navegador\:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>O link \u00E9 v\u00E1lido por 7 dias.<br />Se tiver alguma d\u00FAvida, contacte o seu instalador.</p><p>Com os melhores cumprimentos,<br />Atmoce.</p></html>
EMAIL_LOGOFF_TEMPLATE_SUBJECT=Atmoce - Pedido de cancelamento de conta
EMAIL_LOGOFF_TEMPLATE_CONTENT=<html><div>Caro utilizador, <br />Recebemos o seu pedido para cancelar a sua conta Atmoce. O seu c\u00F3digo de verifica\u00E7\u00E3o \u00E9\: <br /><strong>\n<span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div>\n<p>O c\u00F3digo \u00E9 v\u00E1lido por 10 minutos. Para garantir a seguran\u00E7a, n\u00E3o partilhe este c\u00F3digo com ningu\u00E9m. </p>\n<p>Com os melhores cumprimentos, <br />A equipa Atmoce</p></html>
EMAIL_LOGOFF_FAIL_SUBJECT=Atmoce - Falha no cancelamento da conta
EMAIL_LOGOFF_FAIL_CONTENT=<html><div>Caro utilizador, <br />N\u00E3o foi poss\u00EDvel cancelar a sua conta. <br /><strong>{0}</strong></div>\n<p><br />A equipa Atmoce</p></html>
