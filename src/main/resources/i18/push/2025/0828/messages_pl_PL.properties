STATION_GRID_OFF_LINE_WITHOUT_BATTERY_SUBJECT=Elektrownia Off-Grid
STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny u\u017Cytkowniku\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gratulacje\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Twoja elektrownia [&{}&] przesz\u0142a na tryb Off-Grid. Pozosta\u0142y poziom na\u0142adowania akumulatora wynosi &{}&%, co szacunkowo wystarczy na &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Sprawd\u017A, czy jest to spowodowane przerw\u0105 w zasilaniu z sieci lub b\u0142\u0119dem obwodu AC.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Je\u015Bli masz pytania albo nie potrafisz usun\u0105\u0107 problemu, niezw\u0142ocznie skontaktuj si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Pozdrawiamy,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Elektrownia Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny u\u017Cytkowniku\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gratulacje\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Twoja elektrownia [&{}&] przesz\u0142a na tryb Off-Grid. Pozosta\u0142y poziom na\u0142adowania akumulatora wynosi &lt;&{}&%.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Zalecamy wy\u0142\u0105czenie wszystkich zb\u0119dnych odbiornik\u00F3w w celu oszcz\u0119dzania energii.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Je\u015Bli masz pytania albo nie potrafisz usun\u0105\u0107 problemu, niezw\u0142ocznie skontaktuj si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Pozdrawiamy,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Elektrownia Offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Szanowny u\u017Cytkowniku domowy urz\u0105dzenia Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Gratulujemy\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Twoja elektrownia [&{}&] przesz\u0142a w tryb offline. Zalecamy niezw\u0142oczne przywr\u00F3cenie pracy w sieci.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Mo\u017Cliwe przyczyny\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. Wy\u0142\u0105cznik obwodu PV zadzia\u0142a\u0142 i uk\u0142ad fotowoltaiczny przesta\u0142 dzia\u0142a\u0107.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. Komunikacja pomi\u0119dzy bram\u0105 a chmur\u0105 zosta\u0142a przerwana z powodu b\u0142\u0119du sieci (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Je\u015Bli masz pytania albo nie potrafisz usun\u0105\u0107 problemu, niezw\u0142ocznie skontaktuj si\u0119 z instalatorem.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Pozdrawiamy,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Zesp\u00F3\u0142 Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Stan elektrowni w skr\u00F3cie
STATION_STATUS_INSTALLER_CONTENT=<html> <div style\=""padding\: 20px; line-height\: 1.4""> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Szanowny instalatorze\: </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Gratulacje\! </p> <br /> <p style\=""margin\: 0 0 16px; font-size\: 16px; color\: \#18191a""> Otw\u00F3rz aplikacj\u0119 Atmoce i zaznacz elektrownie, kt\u00F3rymi zarzadz\u0105sz\: &{}&. Szczeg\u00F3\u0142owe informacje\: </p> <ul style\=""padding-left\: 20px""> <li style\=""margin-bottom\: 4px"">Liczba elektrowni offline\: &{}& </li> <li style\=""margin-bottom\: 4px"">Liczba b\u0142\u0119d\u00F3w elektrowni\: &{}& </li> </ul> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a""> Pozostawanie elektrowni w stanie offline przez d\u0142ugi okres mo\u017Ce oznacza\u0107, \u017Ce dosz\u0142o do uruchomienia wy\u0142\u0105cznika obwodu PV, przez co system solarny przesta\u0142 dzia\u0142a\u0107. Sprawd\u017A system. </p> <br /> <p style\=""margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a"">Za\u0142\u0105czone\: Lista elektrowni </p> <table style\=""width\: 100%; border-collapse\: collapse""> <tr> <td style\="" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; "" > Nr </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe"">Nazwa elektrownie</td> <td style\=""height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe"">Data monta\u017Cu </td> <td style\="" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; "" >Opis problemu </td> </tr> &{}& </table> <br /> <br /> <br /> <br /> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559"">Pozdrawiamy, </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559""> Zesp\u00F3\u0142 Atmoce</p> </div> </html>
