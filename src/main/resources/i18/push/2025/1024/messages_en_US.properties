STATION_GRID_OFF_LINE_WITHOUT_BATTERY_SUBJECT=Site Off-Grid
STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dear user\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Greetings\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Your site [&{}&] has gone Off-Grid. Remaining battery level is &{}&%, which is expected to last &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Check if this is due to a grid outage or an AC circuit error.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">If you have questions or are unable to resolve the issue, immediately contact your installer.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Sincerely,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">The Atmoce Team</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Site Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\\\="padding\\\: 20px;line-height\\\: 1.4;"><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Dear user\:</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Greetings\!</p><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Your site [&{}&] has gone Off-Grid. The remaining battery level is &{}&%.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">We recommend that you turn off unnecessary loads to save power.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">If you have questions or are unable to resolve the issue, immediately contact your installer.</p><br /><br /><br /><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Sincerely,</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Atmoce Team</p></div></html>
STATION_OFF_LINE_SUBJECT=Site Offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dear Atmoce Homeowner\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Greetings\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Your site [&{}&] has gone offline. Prompt restoration is recommended.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Possible causes\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. The PV breaker tripped and the solar system stopped working.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. The gateway-cloud communication was interrupted due to a network (FE/Wi-Fi) error.</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">If you have questions or are unable to resolve the issue, immediately contact your installer.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Sincerely,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">The Atmoce Team</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Site Status At A Glance
STATION_STATUS_INSTALLER_CONTENT=STATION_STATUS_INSTALLER_CONTENT\=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dear installer\:</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Greetings\!</p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Please open the Atmoce app and check the &{}& sites under your management. The details are as follows\:</p> <ul style\="padding-left\: 20px"> &{inside}&\u00A0\u00A0\u00A0\u00A0\u00A0 </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">If a site goes offline, the PV breaker may have tripped so that the solar system stopped working. Please check.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> A site remaining offline for a long time may affect the device warranty. Please fix the issue promptly.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Attached\: List of Sites</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > No. </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Site Name</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Installation Date</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Issue Description </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Sincerely,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atmoce Team</p> </div> </body> </html>
