STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html> <div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hej b\u00E4sta anv\u00E4ndare\!</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p><br/> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Din anl\u00E4ggning <span style\="font-weight\: 700;">&{}&</span> har g\u00E5tt Off-Grid. \u00C5terst\u00E5ende batteriniv\u00E5 \u00E4r <span style\="color\: \#3E7EF8;">&{}& %</span>, vilket f\u00F6rv\u00E4ntas r\u00E4cka i <span style\="color\: \#3E7EF8;">&{}&</span>.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Kontrollera om detta beror p\u00E5 ett str\u00F6mavbrott i n\u00E4tet eller ett fel i AC-kretsen.</p><br/> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Om du har fr\u00E5gor eller inte kan l\u00F6sa problemet ska du omedelbart kontakta din installat\u00F6r.</p><br/><br/><br/><br/> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">V\u00E4nliga h\u00E4lsningar,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atmoce-teamet</p></div> </html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Anl\u00E4ggningen Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hej b\u00E4sta anv\u00E4ndare\!</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Din anl\u00E4ggning <span style\="font-weight\: 700;">&{}&</span> har g\u00E5tt Off-Grid. \u00C5terst\u00E5ende batteriniv\u00E5 \u00E4r <span style\="color\: \#3E7EF8;">&{}& %</span>.</p><br/><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Vi rekommenderar att du st\u00E4nger av on\u00F6diga belastningar f\u00F6r att spara str\u00F6m.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Om du har fr\u00E5gor eller inte kan l\u00F6sa problemet ska du omedelbart kontakta din installat\u00F6r.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">V\u00E4nliga h\u00E4lsningar,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atmoce-teamet</p></div></html>
STATION_OFF_LINE_SUBJECT=Anl\u00E4ggningen Off-Grid
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hej b\u00E4sta Atmoce-hem\u00E4gare\!</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Din anl\u00E4ggning <span style\="font-weight\: 700;">&{}&</span> har g\u00E5tt offline. Snabb \u00E5terst\u00E4llning rekommenderas.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">M\u00F6jliga orsaker\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. Solcellsbrytaren l\u00F6ste ut och solcellssystemet slutade fungera.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. Kommunikationen mellan gateway och moln avbr\u00F6ts p\u00E5 grund av ett n\u00E4tverksfel (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Om du har fr\u00E5gor eller inte kan \u00E5tg\u00E4rda problemet ska du omedelbart kontakta din installat\u00F6r.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">V\u00E4nliga h\u00E4lsningar,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atmoce-teamet</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Snabb\u00F6versikt \u00F6ver anl\u00E4ggningens status
STATION_STATUS_INSTALLER_CONTENT=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hej b\u00E4sta installat\u00F6r\!</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"></p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">\u00D6ppna Atmoce-appen och kontrollera de &{}& anl\u00E4ggningar du hanterar. Detaljerna \u00E4r f\u00F6ljande\:</p> <ul style\="padding-left\: 20px"> &{inside}&\u00A0\u00A0\u00A0\u00A0\u00A0 </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Om en anl\u00E4ggning g\u00E5r offline kan solcellsbrytaren ha l\u00F6st ut, vilket g\u00F6r att solcellssystemet slutade fungera. Kontrollera den.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> En anl\u00E4ggning som \u00E4r offline under l\u00E5ng tid kan p\u00E5verka enhetens garanti. \u00C5tg\u00E4rda problemet omg\u00E5ende.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Bifogat\: Lista \u00F6ver anl\u00E4ggningar</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > Nr </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Anl\u00E4ggningsnamn</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Installationsdatum</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Problembeskrivning </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">V\u00E4nliga h\u00E4lsningar,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atmoce-teamet</p> </div> </body> </html>
