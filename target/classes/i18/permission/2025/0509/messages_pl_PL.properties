EMAIL_REGISTER_TEMPLATE_SUBJECT=[{0}]-kod weryfikacyjny Atmoce
EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />Witamy w Atmoce. Tw\u00F3j kod weryfikacyjny to\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Kod jest wa\u017Cny 5 minut. Ze wzgl\u0119d\u00F3w bezpiecze\u0144stwa, nie udost\u0119pniaj go nikomu.</p><p>Z powa\u017Caniem,<br />Atmoce</p></html>
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_SUBJECT=Zg\u0142oszenie odzyskania has\u0142a do chmury Atmoce
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />Otrzymali\u015Bmy Twoje zg\u0142oszenie odzyskania has\u0142a. Tw\u00F3j kod weryfikacyjny to\:<br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Kod jest wa\u017Cny 5 minut. Ze wzgl\u0119d\u00F3w bezpiecze\u0144stwa, nie udost\u0119pniaj go nikomu.</p><p>Z powa\u017Caniem,<br />Atmoce</p></html>
