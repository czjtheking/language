HOMEOWNER_ACTIVATE_TEMPLATE_CONTENT=<html><head><meta charset\="UTF-8"><title>Einladung zur Registrierung bei der Atmozen-App</title></head><body><p>Liebe*r Nutzer*in,</p><p></p><p>Installateur[{0}] hat eine Anlage f\u00FCr Sie erstellt. Um Ihnen die Verwaltung der Anlage zu erleichtern, empfehlen wir Ihnen, die Atmozen-App herunterzuladen und ein Hausbesitzer-Konto zu erstellen.</p><p><strong style\="color\: \#0070c0;">Sie k\u00F6nnen die Atmozen-App im Google Play Store oder im iOS App Store herunterladen.</strong></p><p>Bei Fragen wenden Sie sich bitte an Ihren Installateur.</p><p>Wenn Sie bereits ein Konto bei Atmozen erstellt haben, k\u00F6nnen Sie diese Nachricht ignorieren.</p><p>Mit freundlichen Gr\u00FC\u00DFen</p><p>Atmoce</p></body></html>
