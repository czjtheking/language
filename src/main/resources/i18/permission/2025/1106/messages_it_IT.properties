INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=Benvenuto in Atmoce.
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>Gentile utente,<br />[{0}] ti ha inviato un invito e ha creato un account per te. Account\: {1}. Fai clic sul seguente collegamento per modificare la password e attivare l\u2019account\:<br /><a style\="color\: \#0070c0;" href\="{2}">[Collegamento di attivazione dell\u2019account]</a><br />Oppure copia il collegamento per aprirlo nel tuo browser\:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>Il collegamento \u00E8 valido per 7 giorni.<br />In caso di domande, contatta il tuo installatore.</p><p>Cordiali saluti,<br />Atmoce.</p></html>
