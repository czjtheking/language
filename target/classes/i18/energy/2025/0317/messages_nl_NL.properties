PV_ALARM_SUGGESTION_1_LEVEL=1. Controleer of het oppervlak van het zonnepaneel wordt geblokkeerd door vreemde voorwerpen zoals bladeren, stof, vogeluitwerpselen of door schaduwen van bomen en bovengrondse leidingen. Als dit het geval is, verhelp het dan onmiddellijk.\\n2. Controleer of de lage zonnestraling wordt veroorzaakt door de ori\u00EBntatie van het zonnepaneel.\\n3. Als het probleem aanhoudt, neem dan contact op met uw componentdistributeur of fabrikant.
PV_ALARM_SUGGESTION_2_LEVEL=1. Controleer of het oppervlak van het zonnepaneel wordt geblokkeerd door vreemde voorwerpen zoals bladeren, stof, vogeluitwerpselen of door schaduwen van bomen en bovengrondse leidingen. Als dit het geval is, verhelp het dan onmiddellijk.\\n2. Controleer of de lage zonnestraling wordt veroorzaakt door de ori\u00EBntatie van het zonnepaneel.\\n3. Controleer het zonnepaneel op defecten, zoals glasbreuk, EVA-verkleuring, potentiaalge\u00EFnduceerde degradatie (PID) en kortsluiting van de bypass-diode.\\n4. Neem contact op met uw componentendistributeur of fabrikant als het probleem aanhoudt.
PV_ALARM_SUGGESTION_3_LEVEL=1. Controleer of het oppervlak van het zonnepaneel wordt geblokkeerd door vreemde voorwerpen zoals bladeren, stof, vogeluitwerpselen of door schaduwen van bomen en bovengrondse leidingen. Als dit het geval is, verhelp het dan onmiddellijk.\\n2. Controleer of de lage zonnestraling wordt veroorzaakt door de ori\u00EBntatie van het zonnepaneel.\\n3. Controleer het zonnepaneel op ernstige schade, zoals open circuits.\\n4. Als het probleem aanhoudt, neem dan contact op met uw componentdistributeur of fabrikant.
