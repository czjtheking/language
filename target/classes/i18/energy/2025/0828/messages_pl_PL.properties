STRATEGY_NONE_NONE_GRID_CHARGE=Gdy cena zakupu energii elektrycznej jest niska, magazyn energii \u0142aduje si\u0119 z wyprzedzeniem, aby poradzi\u0107 sobie z przysz\u0142ym szczytowym zapotrzebowaniem na energi\u0119. Dzi\u0119ki temu zarabia si\u0119 na r\u00F3\u017Cnicy cen mi\u0119dzy wysokimi i niskimi stawkami.
STRATEGY_NONE_NONE_SELF_USE=Wystarczaj\u0105ca generacja PV\: Gdy generacja fotowoltaiczna jest wystarczaj\u0105ca, priorytetem jest zasilanie obci\u0105\u017Cenia, nast\u0119pnie \u0142adowanie magazynu energii, a nadwy\u017Cka jest eksportowana do sieci. Zwi\u0119ksza to stop\u0119 autokonsumpcji.
STRATEGY_NONE_NONE_GRID_DISCHARGE=Gdy cena sprzeda\u017Cy energii elektrycznej osi\u0105ga szczyt, magazyn energii pracuje z maksymaln\u0105 moc\u0105 wyj\u015Bciow\u0105. Generuje to przych\u00F3d.
STRATEGY_NONE_NONE_GRID_CHARGE_NEGATIVE_PRICE=Gdy cena zakupu energii elektrycznej jest ujemna, fotowoltaika przestanie oddawa\u0107 energi\u0119, magazyn energii b\u0119dzie \u0142adowany z sieci, a urz\u0105dzenia inteligentne, takie jak pompy ciep\u0142a i stacje \u0142adowania, zostan\u0105 uruchomione. Generuje to przych\u00F3d.
STRATEGY_NONE_NONE_ON_GRID_NEGATIVE_PRICE=Przy ujemnych taryfach feed-in system steruje generacj\u0105 fotowoltaiczn\u0105 tak, aby zaspokaja\u0142a tylko zapotrzebowanie odbioru i \u0142adowanie magazynu, przy zerowym wyp\u0142ywie mocy do sieci. Zapobiega to dodatkowym wydatkom.
BACKUP_POWER_SUPPLY=Elektrownia jest w trybie awaryjnym, a magazyn energii jest szybko \u0142adowany. Zapewnia to maksymalne zasilanie z magazynu podczas awarii sieci.
