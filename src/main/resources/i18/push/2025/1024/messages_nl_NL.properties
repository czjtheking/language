STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Beste gebruiker\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a"Hartelijke groeten\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Uw site [&{}&] is Off-Grid. Resterend batterijniveau bedraagt &{}&%, en dit zal vermoedelijk nog &{}& houden.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Controleer of dit te wijten is aan een stroomstoring of een storing in het wisselstroomcircuit.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Als u vragen heeft of het probleem niet kunt oplossen, neem dan onmiddellijk contact op met uw installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Met vriendelijke groet,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Het Atmoce-team</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Site Off-Grid
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\\\="padding\\\: 20px;line-height\\\: 1.4;"><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Beste gebruiker\:</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Hallo\!</p><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Uw site [&{}&] is Off-Grid. Het resterende batterijniveau is &{}&%.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">We raden u aan onnodige ladingen uit te schakelen om energie te besparen.</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#18191a">Neem direct contact op met uw installateur als u vragen heeft of het probleem niet kunt oplossen.</p><br /><br /><br /><br /><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Met vriendelijke groet,</p><p style\\\="margin\\\: 0; font-size\\\: 16px; color\\\: \\\#515559">Het Atmoce-team</p></div></html>
STATION_OFF_LINE_SUBJECT=Site offline
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Beste Atmoce-woningeigenaar\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hartelijke groeten\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Uw site [&{}&] is offline. Snel herstel wordt aanbevolen.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Mogelijke oorzaken\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. De PV-schakelaar sloeg door en het systeem stopte met werken.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. De communicatie tussen de gateway en de cloud werd onderbroken vanwege een netwerkfout (FE/Wifi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Als u vragen heeft of het probleem niet kunt oplossen, neem dan onmiddellijk contact op met uw installateur.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Met vriendelijke groet,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Het Atmoce-team</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Status van de site in een oogopslag
STATION_STATUS_INSTALLER_CONTENT=STATION_STATUS_INSTALLER_CONTENT\=<html><div style\="padding\: 20px; line-height\: 1.4"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Beste installateur\:</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Hallo\!</p> <br /> <p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Open de Atmoce-app en controleer de &{}& sites die u beheert. De details zijn als volgt\:</p> <ul style\="padding-left\: 20px"> &{inside}& </ul> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Als een site offline gaat, is de PV-schakelaar mogelijk geactiveerd, waardoor het zonne-energiesysteem niet meer werkt. Controleer dit.</p> <p style\="margin\: 0; font-size\: 16px; color\: \#18191a"> Als een site langere tijd offline blijft, kan dit van invloed zijn op de garantie van het apparaat. Los het probleem zo snel mogelijk op.</p> <br /> <p style\="margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a">Bijgevoegd\: Lijst met sites</p> <table style\="width\: 100%; border-collapse\: collapse"> <tr> <td style\=" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; " > Nr. </td> <td style\="height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe">Sitenaam</td> <td style\="height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe">Installatiedatum</td> <td style\=" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; " > Beschrijving van het probleem </td> </tr> &{}& </td> </tr> </table> <br /> <br /> <br /> <br /> <br /> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Met vriendelijke groet,</p> <p style\="margin\: 0; font-size\: 16px; color\: \#515559">Het Atmoce-team</p> </div> </body> </html>
