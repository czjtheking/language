PV_ALARM_SUGGESTION_1_LEVEL=1. Controllare che la superficie del pannello solare non sia ostruita da oggetti estranei come foglie, polvere, escrementi di uccelli o dall\u2019ombra di alberi e linee aeree. In tal caso, intervenire tempestivamente.\n2. Controllare che la scarsa illuminazione solare non sia causata dalla posizione del pannello solare.\n3. Se il problema persiste, contattare il distributore o il produttore del componente.
PV_ALARM_SUGGESTION_2_LEVEL=1. Controllare che la superficie del pannello solare non sia ostruita da oggetti estranei come foglie, polvere, escrementi di uccelli o dall\u2019ombra di alberi e linee aeree. In tal caso, intervenire tempestivamente.\n2. Controllare che la scarsa illuminazione solare non sia causata dalla posizione del pannello solare.\n3. Controllare che il pannello solare non presenti difetti, come danni al vetro, scolorimento EVA, degrado indotto dal potenziale (PID) e cortocircuito del diodo di bypass.\n4. Se il problema persiste, contattare il distributore o il produttore del componente.
PV_ALARM_SUGGESTION_3_LEVEL=1. Controllare che la superficie del pannello solare non sia ostruita da oggetti estranei come foglie, polvere, escrementi di uccelli o dall\u2019ombra di alberi e linee aeree. In tal caso, intervenire tempestivamente.\n2. Controllare che la scarsa illuminazione solare non sia causata dalla posizione del pannello solare.\n3. Controllare che il pannello solare non presenti danni gravi come circuiti aperti.\n4. Se il problema persiste, contattare il distributore o il produttore del componente.
