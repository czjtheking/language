PV_ALARM_SUGGESTION_1_LEVEL=1. Check if the surface of the solar panel is obstructed by foreign objects such as leaves, dust, bird droppings, or by shadows from trees and overhead lines. If so, address it promptly.\n2. Check if the low solar irradiance is caused by the orientation of the solar panel.\n3. If the issue persists, contact your component distributor or manufacturer.
PV_ALARM_SUGGESTION_2_LEVEL=1. Check if the surface of the solar panel is obstructed by foreign objects such as leaves, dust, bird droppings, or by shadows from trees and overhead lines. If so, address it promptly.\n2. Check if the low solar irradiance is caused by the orientation of the solar panel.\n3. Check the solar panel for any faults, such as glass breakage, EVA discoloration, potential-induced degradation (PID), and bypass diode short circuit.\n4. If the issue persists, contact your component distributor or manufacturer.
PV_ALARM_SUGGESTION_3_LEVEL=1. Check if the surface of the solar panel is obstructed by foreign objects such as leaves, dust, bird droppings, or by shadows from trees and overhead lines. If so, address it promptly.\n2. Check if the low solar irradiance is caused by the orientation of the solar panel.\n3. Check the solar panel for severe damage such as open circuits.\n4. If the issue persists, contact your component distributor or manufacturer.
