BATTERY_NOT_DETECTED_110=Mo\u017Cliwa przyczyna\:\n\nWarunki kontroli nie s\u0105 spe\u0142nione. Np. dost\u0119pna pojemno\u015B\u0107 \u0142adowania/zdolno\u015B\u0107 do odprowadzania \u0142adunku akumulatora jest niewystarczaj\u0105ca.
