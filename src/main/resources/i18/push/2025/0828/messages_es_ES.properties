STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Estimado usuario\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">\u00A1Saludos\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">El sitio [&{}&] est\u00E1 fuera de la red el\u00E9ctrica. El nivel de bater\u00EDa restante es del &lt;&{}&%.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Le recomendamos que apague cargas innecesarias para ahorrar energ\u00EDa.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Si tiene dudas al respecto o no puede resolver el problema, contacte inmediatamente con su instalador.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atentamente,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">El Equipo de Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Sitio sin conexi\u00F3n
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Estimado propietario de Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">\u00A1Saludos\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">El sitio [&{}&] est\u00E1 desconectado. Se recomienda una restauraci\u00F3n r\u00E1pida.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Posibles causas\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. El disyuntor fotovoltaico se atasc\u00F3 y el sistema solar dej\u00F3 de funcionar.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. La comunicaci\u00F3n entre la pasarela y la nube se ha visto interrumpida debido a un error de red (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Si tiene dudas al respecto o no puede resolver el problema, contacte inmediatamente con su instalador.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Atentamente,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">El Equipo de Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Estado del sitio de un vistazo
STATION_STATUS_INSTALLER_CONTENT=<html> <div style\=""padding\: 20px; line-height\: 1.4""> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Estimado instalador\: </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">\u00A1Saludos\! </p> <br /> <p style\=""margin\: 0 0 16px; font-size\: 16px; color\: \#18191a""> Abra la aplicaci\u00F3n de Atmoce y compruebe los &{}& sitios que gestiona. Los detalles son los siguientes\: </p> <ul style\=""padding-left\: 20px""> <li style\=""margin-bottom\: 4px"">N\u00FAmero de sitios desactivados\: &{}& </li> <li style\=""margin-bottom\: 4px"">N\u00FAmero de errores en el sitio\: &{}& </li> </ul> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a""> Si un sitio permanece desactivado durante un largo per\u00EDodo de tiempo, puede que el disyuntor fotovoltaico est\u00E9 obstruido y el sistema solar haya dejado de funcionar. Compru\u00E9belo. </p> <br /> <p style\=""margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a"">Adjunto\: Lista de sitios </p> <table style\=""width\: 100%; border-collapse\: collapse""> <tr> <td style\="" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; "" > N.\u00BA </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe"">Nombre del sitio </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe"">Fecha de instalaci\u00F3n </td> <td style\="" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; "" >Descripci\u00F3n del problema </td> </tr> &{}& </table> <br /> <br /> <br /> <br /> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559"">Atentamente, </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559""> El Equipo de Atmoce</p> </div> </html>
