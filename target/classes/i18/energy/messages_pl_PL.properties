PV_ALARM_SUGGESTION_3_LEVEL=1. Sprawd\u017A, czy powierzchnia panelu fotowoltaicznego nie jest zablokowana przez obce przedmioty, takie jak li\u015Bcie, py\u0142, ptasie odchody lub przez cienie drzew czy linie napowietrzne. Je\u015Bli tak jest, niezw\u0142ocznie si\u0119 tym zajmij.\n2. Sprawd\u017A, czy ustawienie panelu fotowoltaicznego nie powoduje niskiego napromieniowania s\u0142onecznego.\n3. Sprawd\u017A panel fotowoltaiczny pod k\u0105tem powa\u017Cnych uszkodze\u0144 jak otwarte obwody.\n4. Je\u015Bli problem nie ust\u0119puje, skontaktuj si\u0119 z dystrybutorem lub producentem podzespo\u0142u.
