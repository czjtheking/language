EMAIL_REGISTER_TEMPLATE_SUBJECT=[{0}] - Dein Atmoce-Cloud Captcha
EMAIL_REGISTER_TEMPLATE_CONTENT=<html><div>Sehr geehrte Benutzer\: <br/> Willkommen bei Atmoce Holding B.V. Ihr Verifizierungscode lautet\: <br /<strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Dieser Code ist nur 5 Minuten g\u00FCltig. Bitte geben Sie diesen Verifizierungscode auf der Atmoce. Geben Sie Ihren Best\u00E4tigungscode aus Sicherheitsgr\u00FCnden nicht an Dritte weiter. </p><p>Mit freundlichen Gr\u00FC\u00DFen <br/> vom Atmoce-Team. </p></html>
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_SUBJECT=Atmoce-Cloud Anfrage zur Wiederherstellung des Passworts
EMAIL_PASSWORD_RETRIEVE_TEMPLATE_CONTENT=<html><div>Sehr geehrte Benutzer\: <br /> Wir haben Ihre Anfrage erhalten, das Passwort Ihres Atmoce-Kontos abzurufen. Ihr Verifizierungscode\: <br /><strong><span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div><p>Dieser Code ist nur 5 Minuten g\u00FCltig. Bitte geben Sie diesen Verifizierungscode auf der Atmoce Holding B.V.-Seite ein. Geben Sie Ihren Best\u00E4tigungscode aus Sicherheitsgr\u00FCnden nicht an Dritte weiter. </p><p>Mit freundlichen Gr\u00FC\u00DFen\!<br/> vom Atmoce-Team</p></html>
EMAIL_CHANGE_TEMPLATE_SUBJECT=Atmoce-Cloud Antrag auf \u00C4nderung des Postfachs
EMAIL_CHANGE_TEMPLATE_CONTENT=<html><div>Sehr geehrte Benutzer\: <br/>Wir haben Ihre Anfrage erhalten, die E-Mail-Adresse Ihres Atmoce-Kontos zu \u00E4ndern. Ihr Verifizierungscode\: <br/><span style\="font-size\: 18px;color\: \#0070c0;"><strong>{0}</strong></span></div><p>Dieser Code ist nur 5 Minuten g\u00FCltig. Bitte geben Sie diesen Verifizierungscode auf der Atmoce. Geben Sie Ihren Best\u00E4tigungscode aus Sicherheitsgr\u00FCnden nicht an Dritte weiter. </p><p>Mit freundlichen Gr\u00FC\u00DFen\!<br/> vom Atmoce-Team</p></html>
FACTORY_PWD_INIT_TEMPLATE_SUBJECT=Atmoce-Cloud Plattform-Konto und Initialpasswort
FACTORY_PWD_INIT_TEMPLATE_CONTENT=<html><div>Liebe*r Nutzer*in,<br />der Administrator hat ein Konto f\u00FCr Sie erstellt. Konto\: {0}, Passwort\: <span style\="">{1}</span><br />\nSie k\u00F6nnen sich wie folgt anmelden und das Passwort \u00E4ndern\:<br />Scannen Sie den QR-Code, um die Atmozen-App herunterzuladen, melden Sie sich mit dem Initialpasswort an und \u00E4ndern Sie dann das Passwort.<br /><div><img width\="200px" height\="200px" src\="{2}" /></div></div><p>Mit freundlichen Gr\u00FC\u00DFen<br />Atmoce</p></html>
INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=Willkommen in Atmoce
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>Sehr geehrte Benutzer\: <br/> Herzlichen Gl\u00FCckwunsch\![{0}] Ich lade Sie ein, sich anzumelden und ein neues Konto f\u00FCr Sie in Atmoce. zu erstellen.Kontonummer\: {1}. Klicken Sie auf den folgenden Link, um Ihr Passwort zu \u00E4ndern und zu aktivieren\: <br /><a style\="color\: \#0070c0;" href\="{2}">[Link zur Kontoaktivierung]</a><br />Or copy the link to open in your browser\:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>Der Aktivierungslink ist 7 Tage g\u00FCltig. <br/> Im Zweifelsfall wenden Sie sich bitte an Ihren Installateur. </p><p>Mit freundlichen Gr\u00FC\u00DFen\!<br/> vom Atmoce-Team</p></html>
EMAIL_LOGOFF_TEMPLATE_SUBJECT=Atmoce \u2013 Antrag auf Kontol\u00F6schung
