STATION_GRID_OFF_LINE_WITHOUT_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Stimate utilizator\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Bun\u0103 ziua\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Loca\u021Bia dvs. [&{}&] a ie\u0219it \u00CEn afara re\u021Belei. Nivelul de energie r\u0103mas\u0103 \u00EEn baterie este de &{}&%, ceea ce este prev\u0103zut s\u0103 dureze &{}&.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Verifica\u021Bi dac\u0103 acest lucru este cauzat de o c\u0103dere a re\u021Belei sau o eroare a circuitului de c.a.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dac\u0103 ave\u021Bi \u00EEntreb\u0103ri sau nu pute\u021Bi rezolva problema, contacta\u021Bi imediat instalatorul.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cu stim\u0103,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Echipa Atmoce</p></div></html>
STATION_GRID_OFF_LINE_BATTERY_SUBJECT=Loca\u021Bie \u00CEn afara re\u021Belei
STATION_GRID_OFF_LINE_BATTERY_CONTENT=<html ><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Stimate utilizator\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Bun\u0103 ziua\!</p><br /><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Loca\u021Bia dvs. [&{}&] a ie\u0219it \u00CEn afara re\u021Belei. Nivelul de energie r\u0103mas \u00EEn baterie este de &lt;&{}&%.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">V\u0103 recomand\u0103m s\u0103 opri\u021Bi sarcinile care nu sunt necesare pentru a economisi energie.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dac\u0103 ave\u021Bi \u00EEntreb\u0103ri sau nu pute\u021Bi rezolva problema, contacta\u021Bi imediat instalatorul.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cu stim\u0103,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Echipa Atmoce</p></div></html>
STATION_OFF_LINE_SUBJECT=Loca\u021Bie deconectat\u0103
STATION_OFF_LINE_CONTENT=<html><div style\="padding\: 20px;line-height\: 1.4;"><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Stimate proprietar de cas\u0103 Atmoce\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Bun\u0103 ziua\!</p><br /><p style\="margin\: 0 0 16px; font-size\: 16px; color\: \#18191a">Loca\u021Bia dvs. [&{}&] s-a deconectat. Se recomand\u0103 restabilirea prompt\u0103.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Cauze posibile\:</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">1. \u00CEntrerup\u0103torul PV s-a decuplat \u0219i sistemul solar nu mai func\u021Bioneaz\u0103.</p><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">2. Comunicarea dintre portal \u0219i cloud s-a \u00EEntrerupt din cauza unei erori de re\u021Bea (FE/Wi-Fi).</p><br><p style\="margin\: 0; font-size\: 16px; color\: \#18191a">Dac\u0103 ave\u021Bi \u00EEntreb\u0103ri sau nu pute\u021Bi rezolva problema, contacta\u021Bi imediat instalatorul.</p><br /><br /><br /><br /><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Cu stim\u0103,</p><p style\="margin\: 0; font-size\: 16px; color\: \#515559">Echipa Atmoce</p></div></html>
STATION_STATUS_INSTALLER_SUBJECT=Starea loca\u021Biei pe scurt
STATION_STATUS_INSTALLER_CONTENT=<html> <div style\=""padding\: 20px; line-height\: 1.4""> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Stimate instalator\: </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a"">Bun\u0103 ziua\! </p> <br /> <p style\=""margin\: 0 0 16px; font-size\: 16px; color\: \#18191a""> V\u0103 rug\u0103m s\u0103 deschide\u021Bi aplica\u021Bia Atmoce \u0219i s\u0103 verifica\u021Bi &{}& loca\u021Bii gestionate de dvs. Detaliile sunt urm\u0103toarele\: </p> <ul style\=""padding-left\: 20px""> <li style\=""margin-bottom\: 4px"">Num\u0103r de loca\u021Bii deconectate\: &{}& </li> <li style\=""margin-bottom\: 4px"">Num\u0103r de erori de loca\u021Bii\: &{}& </li> </ul> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#18191a""> Dac\u0103 o loca\u021Bie a r\u0103mas deconectat\u0103 pe o perioad\u0103 \u00EEndelungat\u0103, este posibil ca \u00EEntrerup\u0103torul PV s\u0103 se fi decuplat \u0219i sistemul solar s\u0103 nu mai fi func\u021Bionat. V\u0103 rug\u0103m s\u0103 verifica\u021Bi. </p> <br /> <p style\=""margin\: 0; margin-bottom\: 4px; font-size\: 16px; color\: \#18191a"">G\u0103si\u021Bi ata\u0219at\u0103\: Lista loca\u021Biilor </p> <table style\=""width\: 100%; border-collapse\: collapse""> <tr> <td style\="" height\: 36px; padding\: 0 24px; width\: 40px; background-color\: \#e5ebfe; border-left\: 1px solid \#e5ebfe; "" > Nr. </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 100px; background-color\: \#e5ebfe"">Nume loca\u021Bie </td> <td style\=""height\: 36px; padding\: 0 24px; width\: 80px; background-color\: \#e5ebfe"">Data instal\u0103rii </td> <td style\="" height\: 36px; padding\: 0 24px; width\: 120px; background-color\: \#e5ebfe; border-right\: 1px solid \#e5ebfe; "" >Descriere problem\u0103 </td> </tr> &{}& </table> <br /> <br /> <br /> <br /> <br /> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559"">Cu stim\u0103, </p> <p style\=""margin\: 0; font-size\: 16px; color\: \#515559""> Echipa Atmoce</p> </div> </html>
