PV_DEFAULT_ERROR_CHECK=Przyczyna i sugestia\:\n\nWarunki kontroli nie s\u0105 spe\u0142nione. Np. ilo\u015B\u0107 energii s\u0142onecznej jest niewystarczaj\u0105ca lub niestabilna. Spr\u00F3buj ponownie przy odpowiednim nas\u0142onecznieniu.\n\nWykryto problemy z przek\u0142adnikiem pr\u0105dowym, takie jak uszkodzenie, od\u0142\u0105czenie lub nieprawid\u0142owe pod\u0142\u0105czenie przek\u0142adnika pr\u0105dowego. Post\u0119puj zgodnie z instrukcj\u0105 obs\u0142ugi, aby naprawi\u0107 pod\u0142\u0105czenie przek\u0142adnika pr\u0105dowego.
