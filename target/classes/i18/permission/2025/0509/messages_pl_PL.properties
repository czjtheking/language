EMAIL_CHANGE_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />Otrzymali\u015Bmy Twoje zg\u0142oszenie zmiany adresu e-mail. Tw\u00F3j kod weryfikacyjny to\:<br /><span style\="font-size\: 18px;color\: \#0070c0;"><strong>{0}</strong></span></div><p>Kod jest wa\u017Cny 5 minut. Ze wzgl\u0119d\u00F3w bezpiecze\u0144stwa, nie udost\u0119pniaj go nikomu.</p><p>Z powa\u017Caniem,<br />Atmoce</p></html>
FACTORY_PWD_INIT_TEMPLATE_SUBJECT=Konto chmury Atmoce i has\u0142o pocz\u0105tkowe
FACTORY_PWD_INIT_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />administrator utworzy\u0142 dla ciebie konto. Konto\: {0}, has\u0142o\: <span style\="">{1}</span><br />\nMo\u017Cesz teraz zalogowa\u0107 si\u0119 i zmieni\u0107 has\u0142o, wykonuj\u0105c nast\u0119puj\u0105ce czynno\u015Bci\:<br />Zeskanuj ten kod QR, aby pobra\u0107 aplikacj\u0119 Atmozen, zaloguj si\u0119, u\u017Cywaj\u0105c pierwotnego has\u0142a, a nast\u0119pnie zmie\u0144 je.<br /><div><img width\="200px" height\="200px" src\="{2}" /></div></div><p>Z powa\u017Caniem<br />Atmoce.</p></html>
INSTALLER_ACTIVATE_TEMPLATE_SUBJECT=Witamy w Atmoce.
INSTALLER_ACTIVATE_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />[{0}] wys\u0142a\u0142 Ci zaproszenie i utworzy\u0142 dla Ciebie konto. Konto\: {1}. Kliknij nast\u0119puj\u0105ce \u0142\u0105cze, aby zmieni\u0107 has\u0142o i aktywowa\u0107 konto\:<br /><a style\="color\: \#0070c0;" href\="{2}">[\u0141\u0105cze aktywacyjne konta]</a><br />Lub skopiuj \u0142\u0105cze, aby otworzy\u0107 je w przegl\u0105darce\:<br /><a style\="color\:\#0070c0" href\="{2}">{2}</a><br /></div><p>\u0141\u0105cze jest aktywne przez 7 dni.<br />W razie pyta\u0144, skontaktuj si\u0119 z instalatorem.</p><p>Z powa\u017Caniem,<br />Atmoce.</p></html>
EMAIL_LOGOFF_TEMPLATE_SUBJECT=Atmoce - zg\u0142oszenie anulowania konta
EMAIL_LOGOFF_TEMPLATE_CONTENT=<html><div>Szanowny u\u017Cytkowniku,<br />Otrzymali\u015Bmy Twoje zg\u0142oszenie anulowania konta Atmoce. Tw\u00F3j kod weryfikacyjny to\:<br /><strong>\n<span style\="font-size\: 18px;color\: \#0070c0;">{0}</span></strong></div>\n<p>Kod jest wa\u017Cny 5 minut. Ze wzgl\u0119d\u00F3w bezpiecze\u0144stwa, nie udost\u0119pniaj go nikomu.</p>\n<p>Z powa\u017Caniem, <br />zesp\u00F3\u0142 Atmoce</p></html>
