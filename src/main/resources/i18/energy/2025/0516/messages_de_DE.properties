PV_ALARM_SUGGESTION_1_LEVEL=1. \u00DCberpr\u00FCfen Sie, ob die Oberfl\u00E4che des Solarmoduls durch Fremdk\u00F6rper wie Bl\u00E4tter, Staub, Vogelkot oder durch Schatten von B\u00E4umen und Freileitungen verdeckt ist. Wenn ja, beheben Sie das Problem umgehend.\n2. \u00DCberpr\u00FCfen Sie, ob die geringe Sonneneinstrahlung durch die Ausrichtung des Solarmoduls verursacht wird.\n3. Wenn das Problem weiterhin besteht, wenden Sie sich an Ihren Ger\u00E4teh\u00E4ndler oder -hersteller.
PV_ALARM_SUGGESTION_2_LEVEL=1. \u00DCberpr\u00FCfen Sie, ob die Oberfl\u00E4che des Solarmoduls durch Fremdk\u00F6rper wie Bl\u00E4tter, Staub, Vogelkot oder durch Schatten von B\u00E4umen und Freileitungen verdeckt ist. Wenn ja, beheben Sie das Problem umgehend.\n2. \u00DCberpr\u00FCfen Sie, ob die geringe Sonneneinstrahlung durch die Ausrichtung des Solarmoduls verursacht wird.\n3. \u00DCberpr\u00FCfen Sie das Solarmodul auf Fehler wie Glasbruch, EVAC-Verf\u00E4rbung, potenzialinduzierte Degradation (PID) und Bypass-Dioden-Kurzschluss.\n4.Wenn das Problem weiterhin besteht, wenden Sie sich an Ihren Ger\u00E4teh\u00E4ndler oder -hersteller.
PV_ALARM_SUGGESTION_3_LEVEL=1. \u00DCberpr\u00FCfen Sie, ob die Oberfl\u00E4che des Solarmoduls durch Fremdk\u00F6rper wie Bl\u00E4tter, Staub, Vogelkot oder durch Schatten von B\u00E4umen und Freileitungen verdeckt ist. Wenn ja, beheben Sie das Problem umgehend.\n2. \u00DCberpr\u00FCfen Sie, ob die geringe Sonneneinstrahlung durch die Ausrichtung des Solarmoduls verursacht wird.\n3. \u00DCberpr\u00FCfen Sie das Solarmodul auf schwere Sch\u00E4den wie offene Schaltkreise.\n4.Wenn das Problem weiterhin besteht, wenden Sie sich an Ihren Ger\u00E4teh\u00E4ndler oder -hersteller.
