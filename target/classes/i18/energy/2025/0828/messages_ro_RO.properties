STRATEGY_NONE_NONE_GRID_CHARGE=Atunci c\u00E2nd pre\u021Bul de achizi\u021Bie al energiei electrice este sc\u0103zut, sistemul de stocare a energiei se \u00EEncarc\u0103 anticipat pentru a face fa\u021B\u0103 viitoarei cereri de energie de v\u00E2rf. Astfel, se profit\u0103 de diferen\u021Ba de pre\u021B dintre tarifele ridicate \u0219i cele sc\u0103zute.
STRATEGY_NONE_NONE_SELF_USE=Generare fotovoltaic\u0103 suficient\u0103\: C\u00E2nd generarea fotovoltaic\u0103 este suficient\u0103, se prioriteaz\u0103 alimentarea sarcinii, apoi \u00EEnc\u0103rcarea acumulatorului, iar surplusul este exportat \u00EEn re\u021Bea. Aceasta m\u0103re\u0219te rata de autoconsum.
STRATEGY_NONE_NONE_GRID_DISCHARGE=C\u00E2nd pre\u021Bul de v\u00E2nzare al energiei electrice este la maxim, stocarea de energie se descarc\u0103 la putere maxim\u0103. Aceasta genereaz\u0103 venituri.
STRATEGY_NONE_NONE_GRID_CHARGE_NEGATIVE_PRICE=C\u00E2nd pre\u021Bul de cump\u0103rare al energiei electrice este negativ, fotovoltaicul va \u00EEnceta s\u0103 mai injecteze energie, stocarea se va \u00EEnc\u0103rca din re\u021Bea \u0219i dispozitivele inteligente, cum ar fi pompele de c\u0103ldur\u0103 \u0219i sta\u021Biile de \u00EEnc\u0103rcare, vor fi activate. Aceasta genereaz\u0103 venituri.
STRATEGY_NONE_NONE_ON_GRID_NEGATIVE_PRICE=C\u00E2nd tariful de feed-in este negativ, sistemul controleaz\u0103 generarea fotovoltaic\u0103 s\u0103 acopere doar consumul sarcinii \u0219i \u00EEnc\u0103rcarea acumulatorului, cu zero injec\u021Bie \u00EEn re\u021Bea. Aceasta evit\u0103 cheltuieli suplimentare.
BACKUP_POWER_SUPPLY=Centrala electric\u0103 este \u00EEn modul de rezerv\u0103 \u0219i stocarea de energie se \u00EEncarc\u0103 rapid. Aceasta asigur\u0103 alimentarea maxim\u0103 cu energie din stocare \u00EEn timpul unei \u00EEntreruperi a re\u021Belei.
OFF_GRID_RUNNING=F\u0103r\u0103 generator\: Centrala electric\u0103 este \u00EEn modul off-grid. Sarcina este alimentat\u0103\u4F18\u5148 din surs\u0103 fotovoltaic\u0103, iar orice deficit este suplimentat prin desc\u0103rcarea acumulatorului. Asigur\u0103 func\u021Bionarea normal\u0103 a sarcinii.Cu generator\: Centrala electric\u0103 este \u00EEn modul off-grid. Alimentarea sarcinii este asigurat\u0103 de o combina\u021Bie de fotovoltaic, acumulator \u0219i generator. Asigur\u0103 func\u021Bionarea normal\u0103 a sarcinii.
OFF_GRID_RUNNING_HAVE_GENERATOR=F\u0103r\u0103 generator\: Centrala electric\u0103 este \u00EEn modul off-grid. Sarcina este alimentat\u0103\u4F18\u5148 din surs\u0103 fotovoltaic\u0103, iar orice deficit este suplimentat prin desc\u0103rcarea acumulatorului. Asigur\u0103 func\u021Bionarea normal\u0103 a sarcinii.Cu generator\: Centrala electric\u0103 este \u00EEn modul off-grid. Alimentarea sarcinii este asigurat\u0103 de o combina\u021Bie de fotovoltaic, acumulator \u0219i generator. Asigur\u0103 func\u021Bionarea normal\u0103 a sarcinii.
ENERGY_STORAGE_CHARGING=Energie stocat\u0103 insuficient\u0103. \u00CEnc\u0103rcare acumulator. \u00CEnc\u0103rca\u021Bi p\u00E2n\u0103 la {0}% pentru a asigura energie stocat\u0103 suficient\u0103 \u00EEn perioadele cu pre\u021Buri ridicate.
ENERGY_STORAGE_DISCHARGING=Energie stocat\u0103 suficient\u0103. Desc\u0103rcare acumulator. Rezerva\u021Bi {0}% pentru a asigura energie stocat\u0103 suficient\u0103 \u00EEn perioadele cu pre\u021Buri ridicate.
