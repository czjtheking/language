PV_ALARM_SUGGESTION_1_LEVEL=1. Kontrollera om solpanelens yta \u00E4r blockerad av fr\u00E4mmande f\u00F6rem\u00E5l, t.ex. l\u00F6v, damm, f\u00E5gelspillning, eller av skuggor fr\u00E5n tr\u00E4d och luftledningar. \u00C5tg\u00E4rda i s\u00E5 fall problemet omg\u00E5ende.\n2. Kontrollera om l\u00E5g solinstr\u00E5lning orsakas av solpanelens orientering.\n3. Om problemet kvarst\u00E5r ska du kontakta din komponentdistribut\u00F6r eller tillverkare.
PV_ALARM_SUGGESTION_2_LEVEL=1. Kontrollera om solpanelens yta \u00E4r blockerad av fr\u00E4mmande f\u00F6rem\u00E5l, t.ex. l\u00F6v, damm, f\u00E5gelspillning, eller av skuggor fr\u00E5n tr\u00E4d och luftledningar. \u00C5tg\u00E4rda i s\u00E5 fall problemet omg\u00E5ende.\n2. Kontrollera om l\u00E5g solinstr\u00E5lning orsakas av solpanelens orientering.\n3. Kontrollera solpanelen f\u00F6r eventuella fel, t.ex. sprickor i glaset, missf\u00E4rgning av EVA, potentialinducerad nedbrytning (PID) eller kortslutning i bypass-dioden.\n4. Om problemet kvarst\u00E5r ska du kontakta din komponentdistribut\u00F6r eller tillverkare.
PV_ALARM_SUGGESTION_3_LEVEL=1. Kontrollera om solpanelens yta \u00E4r blockerad av fr\u00E4mmande f\u00F6rem\u00E5l, t.ex. l\u00F6v, damm, f\u00E5gelspillning, eller av skuggor fr\u00E5n tr\u00E4d och luftledningar. \u00C5tg\u00E4rda i s\u00E5 fall problemet omg\u00E5ende.\n2. Kontrollera om l\u00E5g solinstr\u00E5lning orsakas av solpanelens orientering.\n3. Kontrollera solpanelen f\u00F6r allvarliga skador, t.ex. \u00F6ppna kretsar.\n4. Om problemet kvarst\u00E5r ska du kontakta din komponentdistribut\u00F6r eller tillverkare.
